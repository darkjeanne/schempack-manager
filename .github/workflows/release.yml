name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example release_1.0 or v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PATH
        run: |
          echo "${ANDROID_HOME}/build-tools/34.0.0" >> "$GITHUB_PATH"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Select release tag
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run behavior tests
        run: |
          chmod +x ./gradlew
          ./gradlew behaviorTest

      - name: Build release jar
        run: |
          ./gradlew deploy
          find build/libs -maxdepth 1 -type f -name "*.jar" -print -exec ls -lh {} \;

      - name: Locate release jar
        id: release-jar
        run: |
          jar_path="build/libs/schempack-manager.jar"
          if [ ! -f "$jar_path" ]; then
            jar_path="$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*Desktop.jar" | head -n 1)"
          fi
          if [ -z "$jar_path" ] || [ ! -f "$jar_path" ]; then
            echo "Release jar was not created."
            find . -maxdepth 3 -type f | sort
            exit 1
          fi
          mkdir -p dist
          cp "$jar_path" "dist/schempack-manager.jar"
          echo "path=$jar_path" >> "$GITHUB_OUTPUT"
          echo "asset=dist/schempack-manager.jar" >> "$GITHUB_OUTPUT"
          ls -lh "dist/schempack-manager.jar"

      - name: Verify release jar metadata
        run: |
          jar tf dist/schempack-manager.jar | grep -x "mod.hjson"
          jar xf dist/schempack-manager.jar mod.hjson
          cat mod.hjson
          grep -q 'name: "schempack-manager"' mod.hjson
          grep -q 'main: "schempack.SchemPackManager"' mod.hjson

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              gh release create "$TAG" \
                --title "$TAG" \
                --generate-notes \
                --target "$GITHUB_SHA"
            else
              gh release create "$TAG" \
                --title "$TAG" \
                --generate-notes \
                --verify-tag
            fi
          fi
          gh release upload "$TAG" "${{ steps.release-jar.outputs.asset }}" --clobber
